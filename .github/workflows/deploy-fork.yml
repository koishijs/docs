name: Deploy Fork

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4

      - name: Yarn Cache Dir
        id: cache
        run: echo "value=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Restore Lockfile
        uses: actions/cache@v3
        with:
          path: yarn.lock
          key: yarn-lock-${{ github.sha }}
          restore-keys: yarn-lock-

      - name: Restore Cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.cache.outputs.value }}
          key: yarn-cache-${{ github.sha }}
          restore-keys: yarn-cache-

      - name: Install
        run: yarn

      - name: Build
        run: yarn build

      - name: Check commit message
        id: check_commit
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -qi "build page"; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "Commit message contains 'build page', will deploy to GitHub Pages"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "Commit message does not contain 'build page', skipping deployment"
          fi

      - name: Deploy to GitHub Pages
        if: ${{ steps.check_commit.outputs.should_deploy == 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .vitepress/dist
          force_orphan: true
          enable_jekyll: true
          commit_message: '[skip ci] deploy'